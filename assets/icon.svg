<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1a26"/>
      <stop offset="1" stop-color="#0f0d14"/>
    </linearGradient>
    <linearGradient id="s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c4a8ff"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="none" stroke="rgba(139,92,246,0.18)" stroke-width="2"/>
  <text x="512" y="640" text-anchor="middle"
        font-family="-apple-system, ui-sans-serif, system-ui, sans-serif"
        font-weight="800"
        font-size="640"
        fill="url(#s)"
        filter="url(#glow)">S</text>
</svg>
